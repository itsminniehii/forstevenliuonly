<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱 Cat World</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #fff5f5;
      font-family: sans-serif;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    h1 { color: #ff8fab; }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ffb3c6;
      border-radius: 10px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #ff8fab;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background-color: #ff6b8a; }
    .error { color: red; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🐱 Cat World</h1>
    <p>歡迎回來</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="密碼" />
    <button id="login-btn">進入貓世界</button>
    <p class="error" id="error-msg"></p>
  </div>

  <script>
    const { createClient } = window.supabase
    const client = createClient(
      'https://dnvjlchlvdshqhiraume.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRudmpsY2hsdmRzaHFoaXJhdW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzgyNjQsImV4cCI6MjA5MDgxNDI2NH0.CK4Ro7kCr7nktMAhIKcSmch2YYsjETaWwefxcswF7ew'
    )

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const { error } = await client.auth.signInWithPassword({ email, password })
      if (error) {
        document.getElementById('error-msg').textContent = '帳號或密碼錯誤，請再試一次'
      } else {
        window.location.href = 'home.html'
      }
    })
  </script>
</body>
</html>
